const d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function open(pw){
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:d(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:d(IV)},key,d(CT));
  return new TextDecoder().decode(pt);
}
async function go(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err'); err.textContent='';
  if(!pw){err.textContent='パスワードを入力してください';return;}
  try{
    const html=await open(pw);
    document.open();document.write(html);document.close();
  }catch(e){err.textContent='パスワードが違います';}
}
document.getElementById('go').addEventListener('click',go);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
